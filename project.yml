name: BambuGateway
options:
  deploymentTarget:
    iOS: '18.0'
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
    CURRENT_PROJECT_VERSION: 11
    MARKETING_VERSION: 1.8.0
    TARGETED_DEVICE_FAMILY: 1,2
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: BambuGateway/Support/Info.plist
    CODE_SIGN_STYLE: Automatic
packages:
  GCodePreview:
    url: https://github.com/leolobato/GCodePreview
    exactVersion: 1.0.1
  MobileVLCKit:
    url: https://github.com/MobileVLCKit-SPM/MobileVLCKit-SPM
    exactVersion: 3.7.3
targets:
  BambuGateway:
    type: application
    platform: iOS
    deploymentTarget: '18.0'
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: BambuGateway
        excludes:
          - '**/*.md'
          - GCodeKit
    dependencies:
      - target: ShareExtension
      - target: LiveActivityExtension
      - package: GCodePreview
      - package: MobileVLCKit
    settings:
      base:
        PRODUCT_NAME: BambuGateway
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        OTHER_LDFLAGS: ["-lz"]
        CODE_SIGN_ENTITLEMENTS: BambuGateway/Support/BambuGateway.entitlements
  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: '18.0'
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_NAME: ShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: $(SHARE_EXTENSION_BUNDLE_ID)
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.0
  LiveActivityExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: '18.0'
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: LiveActivityExtension
      - path: BambuGateway/Models/PrintActivityAttributes.swift
    settings:
      base:
        PRODUCT_NAME: LiveActivityExtension
        PRODUCT_BUNDLE_IDENTIFIER: $(LIVE_ACTIVITY_BUNDLE_ID)
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        INFOPLIST_FILE: LiveActivityExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.0
  BambuGatewayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '18.0'
    configFiles:
      Debug: Configuration/Base.xcconfig
      Release: Configuration/Base.xcconfig
    sources:
      - path: BambuGatewayTests
    dependencies:
      - target: BambuGateway
    settings:
      base:
        PRODUCT_NAME: BambuGatewayTests
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID).tests
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.0
schemes:
  BambuGateway:
    build:
      targets:
        BambuGateway: all
        ShareExtension: [build]
        LiveActivityExtension: [build]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BambuGatewayTests
    analyze:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
  ShareExtension:
    build:
      targets:
        ShareExtension: all
        BambuGateway: [build]
    run:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
